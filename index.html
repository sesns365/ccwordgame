                                <p style="font-size: 12pt; color: #555; margin: 2pt 0 0 0;">嘉義縣識字學習系統教材</p>
                            </div>
                            <table border="0" width="100%" style="margin-bottom: 10pt; font-size: 13pt; border-bottom: 1pt solid #ccc; padding-bottom: 5pt;">
                                <tr>
                                    <td width="40%">冊別：第 ${vol} 冊 / 第 ${l} 關</td>
                                    <td width="30%" align="center">姓名：_________</td>
                                    <td width="30%" align="right">日期：__/ __/ __</td>
                                </tr>
                            </table>
                            ${questions}
                        </div>
                        ${idx < levels.length - 1 ? '<br clear=all style="mso-break-type:section-break;page-break-before:always">' : ''}
                    `;

                    answersHtml += `
                        <div style="margin-top: 20pt; border: 1pt solid #000; padding: 10pt;">
                            <p style="font-size: 14pt; font-weight: bold; margin: 0 0 5pt 0;">第 ${vol} 冊 第 ${l} 關 - 解答</p>
                            <p style="font-size: 12pt; line-height: 1.5; margin: 0; letter-spacing: 2pt;">${levelAnswers.join(' &nbsp; ')}</p>
                        </div>
                    `;
                });
                exportToDoc(`識字大冒險_第${vol}冊_全冊學習單.doc`, questionsHtml, answersHtml);
            };

            const renderHeader = (pageTitle, showBack = true, backAction = () => setView('home'), rightActions = null) => (
                <header className="w-full bg-white shadow-md py-3 px-3 md:py-4 md:px-6 flex flex-row items-center justify-between mb-8 sticky top-0 z-40 gap-2">
                    <div className="flex items-center gap-2 md:gap-4 overflow-hidden">
                        {showBack && (
                            <button onClick={backAction} className="px-3 py-2 md:px-4 md:py-2 bg-slate-200 hover:bg-slate-300 rounded-xl font-bold text-slate-700 shrink-0 text-xs md:text-base focus:outline-none text-nowrap">返回</button>
                        )}
                        <div className="flex flex-col min-w-0">
                            <div className="flex items-center gap-2 md:gap-3">
                                <h1 className="text-lg md:text-2xl font-black text-blue-900 tracking-wide whitespace-nowrap overflow-hidden text-ellipsis text-nowrap">識字大冒險</h1>
                                <span className="text-[10px] md:text-sm font-bold text-blue-600 bg-blue-100 px-2 py-0.5 rounded whitespace-nowrap shrink-0">嘉義縣識字學習系統教材</span>
                            </div>
                            {pageTitle && <h2 className="text-xs md:text-lg font-bold text-slate-500 mt-0.5 truncate">{pageTitle}</h2>}
                        </div>
                    </div>
                    <div className="flex items-center gap-1.5 md:gap-2 shrink-0">
                        {rightActions}
                        <button onClick={() => { setShowSettings(true); setConfirmDelete(false); }} className="p-2 md:p-3 bg-slate-100 hover:bg-slate-200 rounded-xl text-slate-700 transition flex items-center gap-1.5 md:gap-2 font-bold text-xs md:text-base focus:outline-none shadow-sm"><IconSettings /></button>
                    </div>
                </header>
            );

            const renderContent = () => {
                if (loading) return <div className="w-full flex-1 flex items-center justify-center text-xl md:text-3xl font-bold text-slate-400">載入中...</div>;

                if (view === 'login') {
                    const handleLogin = (e) => {
                        e.preventDefault(); const name = e.target.pname.value.trim();
                        if (name) { setPlayerName(name); setView('home'); }
                    };
                    return (
                        <div className="w-full flex-1 flex flex-col items-center justify-center px-4">
                            {renderHeader('登入大冒險', false)}
                            <form onSubmit={handleLogin} className="bg-white p-6 md:p-10 rounded-3xl shadow-xl w-full max-w-md flex flex-col gap-6 text-center mt-4">
                                <div className="text-6xl md:text-8xl mb-2">🚀</div>
                                <h2 className="text-2xl md:text-3xl font-bold mb-2 md:mb-4">請輸入你的名字</h2>
                                <input name="pname" type="text" placeholder="你的名字..." required className="text-xl md:text-2xl p-4 border-2 rounded-xl text-center w-full focus:outline-none focus:border-blue-500" autoFocus />
                                <button type="submit" className="bg-blue-500 text-white font-bold text-xl md:text-2xl py-4 rounded-xl hover:bg-blue-600 transition shadow-md mt-2 md:mt-4 focus:outline-none">開始挑戰</button>
                            </form>
                        </div>
                    );
                }

                if (view === 'home') {
                    const startGame = (v, l) => { setActiveVol(v); setActiveLevel(l); setView('gamePlay'); };
                    const homeRightActions = (
                        <button onClick={() => downloadAllWorksheets(selectedVol)} className="p-2 md:px-4 md:py-3 bg-emerald-500 hover:bg-emerald-600 text-white rounded-xl transition flex items-center gap-1.5 md:gap-2 font-bold text-xs md:text-base focus:outline-none shadow-sm text-nowrap">
                            <IconDownload /> <span className="hidden sm:inline">全冊 Word</span><span className="sm:hidden">全冊</span>
                        </button>
                    );
                    return (
                        <div className="w-full flex-1 flex flex-col items-center">
                            {renderHeader(`你好，${playerName}！`, true, () => setView('login'), homeRightActions)}
                            <div className="w-full max-w-5xl px-4 md:px-6">
                                <div className="flex gap-2 md:gap-4 overflow-x-auto pb-6 custom-scrollbar">
                                    {[1, 2, 3, 4, 5].map(v => (
                                        <button key={v} onClick={() => setSelectedVol(v)} className={`flex-shrink-0 px-6 py-3 md:px-8 md:py-4 rounded-xl md:rounded-2xl font-bold text-lg md:text-2xl transition-all focus:outline-none ${v === selectedVol ? 'bg-blue-600 text-white shadow-lg scale-105' : 'bg-white text-blue-600 shadow border-2 border-blue-100 hover:bg-blue-50'}`}>第 {v} 冊</button>
                                    ))}
                                </div>
                                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6 mt-4 md:mt-6 pb-20 text-center">
                                    {GAME_DATA[selectedVol]?.map((levelWords, index) => {
                                        const l = index + 1; const isUnlocked = levelWords && levelWords.length > 0;
                                        const bestScore = getBestScore(playerHistory, selectedVol, l);
                                        return (
                                            <button key={l} disabled={!isUnlocked} onClick={() => startGame(selectedVol, l)} className={`relative flex flex-col items-center justify-center p-4 md:p-6 rounded-2xl md:rounded-3xl border-4 transition-all h-32 md:h-40 focus:outline-none ${isUnlocked ? 'border-green-400 bg-white hover:bg-green-50 hover:scale-105 shadow-md cursor-pointer' : 'border-slate-200 bg-slate-100 text-slate-400 cursor-not-allowed'}`}>
                                                {!isUnlocked ? <div className="mb-1 md:mb-2 opacity-50 scale-75 md:scale-100"><IconLock /></div> : <span className="text-xl md:text-2xl font-bold text-green-800 mb-1 md:mb-2 text-nowrap">第 {l} 關</span>}
                                                {isUnlocked && bestScore !== null && <span className={`px-2 py-0.5 rounded-full text-sm md:text-lg font-bold ${bestScore >= 80 ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'}`}>{bestScore}%</span>}
                                                {isUnlocked && bestScore === null && <div className="px-2 py-0.5 rounded-full bg-blue-100 text-blue-700 text-xs md:text-sm font-bold text-nowrap">挑戰 ⭐</div>}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    );
                }

                if (view === 'gamePlay') {
                    return (
                        <div className="w-full flex-1 flex flex-col items-center bg-slate-50">
                            <GamePlayView vol={activeVol} level={activeLevel} levelWords={GAME_DATA[activeVol][activeLevel - 1]} appSettings={appSettings} onFinish={(score, mistakes, endReason = false, timeSpent = 0) => { setGameResult({ score, mistakes, endReason, timeSpent }); setView('gameResult'); }} onCancel={() => setView('home')} speak={speak} />
                        </div>
                    );
                }

                if (view === 'gameResult') {
                    const { score, mistakes } = gameResult;
                    const handleSaveAndNext = async () => { const historyKey = `v${activeVol}l${activeLevel}_${Date.now()}`; const newHistory = { ...playerHistory, [historyKey]: { score, mistakes: mistakes.map(m=>m.target.word), timeSpent: gameResult.timeSpent, date: new Date().toISOString() } }; setPlayerHistory(newHistory); localStorage.setItem(LOCAL_STORAGE_KEY_HISTORY, JSON.stringify(newHistory)); setView('home'); };
                    return (
                        <div className="w-full flex-1 flex flex-col items-center justify-center p-4 pb-20 overflow-y-auto text-center">
                            <div className="bg-white rounded-3xl shadow-2xl p-6 md:p-10 w-full max-w-2xl flex flex-col items-center text-center border-t-8 border-t-blue-500 my-auto">
                                <div className="text-6xl md:text-8xl mb-4 md:mb-6">{score >= 80 ? '🎉' : '💪'}</div>
                                <h2 className={`text-3xl md:text-5xl font-bold mb-2 md:mb-4 ${score >= 80 ? 'text-green-600' : 'text-orange-500'}`}>{score >= 80 ? '闖關成功！' : '再接再厲！'}</h2>
                                <p className={`text-xl md:text-3xl font-bold text-slate-700 mb-6 md:mb-8 text-nowrap`}>正確率：<span className={score >= 80 ? 'text-green-600' : 'text-orange-500'}>{score}%</span></p>
                                <button onClick={handleSaveAndNext} className="w-full py-3 md:py-4 bg-green-500 text-white rounded-xl md:rounded-2xl font-bold text-lg md:text-xl hover:bg-green-600 transition shadow-lg focus:outline-none">回選單</button>
                            </div>
                        </div>
                    );
                }
                return null;
            };

            return (
                <div className="flex flex-col min-h-screen bg-slate-50 relative overflow-x-hidden">
                    <div className="flex-1 flex flex-col">{renderContent()}</div>
                    
                    {/* 設定 Modal */}
                    {showSettings && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl p-6 md:p-8 max-w-md w-full shadow-2xl max-h-[90vh] overflow-y-auto custom-scrollbar">
                                <h2 className="text-2xl md:text-3xl font-bold mb-4 md:mb-6 text-slate-800 flex items-center gap-2"><IconSettings /> 遊戲設定</h2>
                                <div className="flex flex-col gap-4 md:gap-6 text-left">
                                    <div className="bg-slate-50 p-3 md:p-4 rounded-xl border border-slate-200">
                                        <span className="text-lg font-bold text-slate-700 border-b pb-2 block mb-3 text-nowrap">字體大小</span>
                                        <div className="flex gap-2">
                                            {[0, 1, 2].map(l => <button key={l} onClick={()=>toggleSetting('fontSizeLevel', l)} className={`px-3 py-1 rounded font-bold transition focus:outline-none ${appSettings.fontSizeLevel===l?'bg-blue-500 text-white':'bg-white border border-slate-300'}`}>A{l===0?'-':l===2?'+':''}</button>)}
                                        </div>
                                    </div>
                                    <div className="bg-slate-50 p-3 md:p-4 rounded-xl border border-slate-200">
                                        <span className="text-lg font-bold text-slate-700 border-b pb-2 block mb-3 text-nowrap">語音設定</span>
                                        <label className="flex items-center justify-between cursor-pointer mb-4"><span className="font-bold text-slate-600">自動報讀題目</span><input type="checkbox" checked={appSettings.autoRead} onChange={() => toggleSetting('autoRead')} className="w-5 h-5 md:w-6 md:h-6 accent-blue-500 focus:outline-none" /></label>
                                        <input type="range" min="0.5" max="1.5" step="0.05" value={appSettings.voiceRate || 0.85} onChange={(e) => toggleSetting('voiceRate', parseFloat(e.target.value))} className="w-full accent-blue-500 mb-2 focus:outline-none" />
                                        <div className="text-xs text-slate-500 text-center text-nowrap">速度: {appSettings.voiceRate}x</div>
                                    </div>
                                    <div className="bg-slate-50 p-3 md:p-4 rounded-xl border border-slate-200">
                                        <span className="text-lg font-bold text-slate-700 border-b pb-2 block mb-3 text-nowrap">遊戲模式</span>
                                        <div className="flex flex-col gap-3">
                                            {[
                                                { id: 'normal', label: '一般模式', desc: '答題即時顯示對錯，適合基礎練習。' },
                                                { id: 'heart', label: '愛心制度', desc: '擁有3顆愛心，答錯3題就得重頭來過！' },
                                                { id: 'timer', label: '計時模式', desc: '限時內完成挑戰，考驗大腦反應速度。' },
                                                { id: 'submit', label: '交卷模式', desc: '作答時不提示對錯，最後才結算成績。' }
                                            ].map(m => (
                                                <label key={m.id} className="flex items-start gap-3 p-2 cursor-pointer hover:bg-white/50 rounded-lg transition-colors">
                                                    <input type="radio" name="mode" value={m.id} checked={appSettings.gameMode === m.id} onChange={e=>toggleSetting('gameMode', e.target.value)} className="mt-1 focus:outline-none" />
                                                    <div className="flex flex-col">
                                                        <span className="font-bold text-slate-800 text-nowrap">{m.label}</span>
                                                        <span className="text-xs text-slate-500 leading-tight">{m.desc}</span>
                                                    </div>
                                                </label>
                                            ))}
                                        </div>
                                    </div>

                                    {/* ⚠️ 危險區域：清除紀錄 */}
                                    <div className="bg-red-50 p-3 md:p-4 rounded-xl border border-red-200">
                                        <span className="text-lg font-bold text-red-700 border-b border-red-200 pb-2 block mb-3 text-nowrap">⚠️ 危險區域</span>
                                        {!confirmDelete ? (
                                            <button 
                                                onClick={() => setConfirmDelete(true)}
                                                className="w-full flex items-center justify-center gap-2 py-2.5 bg-white border-2 border-red-500 text-red-600 rounded-xl font-bold hover:bg-red-500 hover:text-white transition-all text-sm md:text-base focus:outline-none"
                                            >
                                                <IconTrash /> 清除所有闖關紀錄
                                            </button>
                                        ) : (
                                            <div className="flex flex-col gap-2">
                                                <p className="text-xs font-bold text-red-600 text-center">確定要刪除所有進度與分數嗎？</p>
                                                <div className="flex gap-2">
                                                    <button onClick={handleClearAllData} className="flex-1 py-2 bg-red-600 text-white rounded-lg font-bold text-sm">確定</button>
                                                    <button onClick={() => setConfirmDelete(false)} className="flex-1 py-2 bg-slate-200 text-slate-700 rounded-lg font-bold text-sm">取消</button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                                <button onClick={() => setShowSettings(false)} className="w-full mt-6 bg-blue-500 text-white font-bold py-3 rounded-xl hover:bg-blue-600 transition-colors focus:outline-none">完成設定</button>
                            </div>
                        </div>
                    )}
                    <footer className="w-full text-center py-4 text-slate-400 font-bold text-xs bg-slate-100 border-t">由特工365製作</footer>
                </div>
            );
        }

        const GamePlayView = ({ vol, level, levelWords, appSettings, onFinish, onCancel, speak }) => {
            const [questions, setQuestions] = useState([]); const [currentIndex, setCurrentIndex] = useState(0); const [mistakes, setMistakes] = useState([]);
            const [feedback, setFeedback] = useState(null); const [hearts, setHearts] = useState(3); const [timeElapsed, setTimeElapsed] = useState(0); const [timeLeft, setTimeLeft] = useState(appSettings.timerDuration || 60);
            useEffect(() => {
                const generated = levelWords.map(targetObj => {
                    const opts = [targetObj.word]; let pool = levelWords.filter(w => w.word !== targetObj.word); let shuffledPool = [...pool].sort(() => 0.5 - Math.random());
                    for (let i = 0; i < 3 && i < shuffledPool.length; i++) opts.push(shuffledPool[i].word);
                    const phrase = targetObj.phrases[Math.floor(Math.random() * targetObj.phrases.length)];
                    return { target: targetObj, phrase, options: opts.sort(() => 0.5 - Math.random()) };
                }); setQuestions(generated);
            }, [levelWords]);
            useEffect(() => {
                if (!questions[currentIndex] || feedback?.status === 'timeout') return;
                const timer = setInterval(() => { setTimeElapsed(prev => prev + 1); if (appSettings.gameMode === 'timer') setTimeLeft(prev => prev - 1); }, 1000);
                return () => clearInterval(timer);
            }, [currentIndex, appSettings.gameMode, feedback]);
            useEffect(() => {
                if (appSettings.gameMode === 'timer' && timeLeft <= 0 && !feedback) { setFeedback({ status: 'timeout' }); setTimeout(() => onFinish(Math.round(((questions.length - mistakes.length) / questions.length) * 100), mistakes, 'timeout', timeElapsed), 1500); }
            }, [timeLeft]);
            useEffect(() => { if (questions[currentIndex] && !feedback && appSettings.autoRead) speak(questions[currentIndex].phrase); }, [currentIndex, feedback]);
            
            const handleAnswer = (ans) => {
                if (feedback) return; const currentQ = questions[currentIndex]; const isCorrect = ans === currentQ.target.word;
                if (appSettings.gameMode === 'submit') {
                    let nm = isCorrect ? mistakes : [...mistakes, currentQ]; setFeedback({ status: 'selected', clicked: ans });
                    setTimeout(() => { setFeedback(null); if (currentIndex + 1 < questions.length) setCurrentIndex(prev => prev + 1); else onFinish(Math.round(((questions.length - nm.length) / questions.length) * 100), nm, false, timeElapsed); }, 300); return;
                }
                if (isCorrect) {
                    setFeedback({ status: 'correct', clicked: ans });
                    setTimeout(() => { setFeedback(null); if (currentIndex + 1 < questions.length) setCurrentIndex(prev => prev + 1); else onFinish(Math.round(((questions.length - mistakes.length) / questions.length) * 100), mistakes, false, timeElapsed); }, 800);
                } else {
                    const nm = [...mistakes, currentQ]; setMistakes(nm); setFeedback({ status: 'incorrect', clicked: ans });
                    if (appSettings.gameMode === 'heart') { const nh = hearts - 1; setHearts(nh); if (nh <= 0) { setTimeout(() => onFinish(0, nm, 'heart', timeElapsed), 1500); return; } }
                    setTimeout(() => { setFeedback(null); if (currentIndex + 1 < questions.length) setCurrentIndex(prev => prev + 1); else onFinish(Math.round(((questions.length - nm.length) / questions.length) * 100), nm, false, timeElapsed); }, 1500);
                }
            };

            const getBtnClass = (opt) => {
                const base = "bg-white border-4 border-slate-200 rounded-2xl p-6 md:p-10 text-5xl md:text-8xl font-bold text-slate-800 transition-all active:scale-95 focus:outline-none game-btn";
                if (!feedback) return base;
                const feedbackBase = "rounded-2xl p-6 md:p-10 text-5xl md:text-8xl font-bold game-btn transition-all";
                if (feedback.status === 'selected') {
                    return opt === feedback.clicked 
                        ? `${feedbackBase} bg-blue-100 border-blue-500 text-blue-700 z-10` 
                        : `${feedbackBase} bg-white border-4 border-slate-100 text-slate-200 opacity-40`;
                }
                if (opt === cq.target.word) {
                    return `${feedbackBase} bg-green-100 border-green-500 text-green-700 z-10 shadow-xl`;
                }
                if (feedback.status === 'incorrect' && opt === feedback.clicked) {
                    return `${feedbackBase} bg-red-100 border-red-500 text-red-700 opacity-70`;
                }
                return `${feedbackBase} bg-white border-4 border-slate-100 text-slate-200 opacity-40`;
            };

            if (!questions[currentIndex]) return null; const cq = questions[currentIndex];
            return (
                <div className="w-full flex-1 flex flex-col items-center">
                    <div className="w-full bg-white shadow-sm p-3 md:p-4 flex items-center justify-between mb-4 md:mb-8 sticky top-0 z-30">
                        <button onClick={onCancel} className="px-3 py-1.5 bg-slate-200 rounded-lg font-bold text-slate-700 text-xs md:text-base game-btn focus:outline-none text-nowrap">退出</button>
                        <div className="flex-1 px-4 md:px-8"><div className="w-full bg-slate-200 rounded-full h-2"><div className="bg-blue-500 h-2 rounded-full transition-all duration-300" style={{ width: `${((currentIndex) / questions.length) * 100}%` }}></div></div></div>
                        <div className="flex items-center gap-2">
                            {appSettings.gameMode === 'timer' && <div className="font-bold text-orange-600 text-sm md:text-base text-nowrap">⏳ {timeLeft}s</div>}
                            {appSettings.gameMode === 'heart' && <div className="flex items-center gap-1">{[...Array(3)].map((_, i) => <div key={i} className={`transition-all duration-300 ${i < hearts ? "opacity-100 scale-100" : "opacity-20 scale-75"}`}><IconHeart /></div>)}</div>}
                        </div>
                    </div>
                    <div className="w-full max-w-4xl px-4 flex flex-col items-center flex-1 justify-center pb-10">
                        <div className="w-full bg-white rounded-2xl md:rounded-3xl shadow-lg p-6 md:p-12 text-center mb-6 md:mb-10 border-4 border-blue-50 relative">
                            <button onClick={() => speak(cq.phrase)} className="absolute top-2 right-2 p-2 bg-blue-100 text-blue-600 rounded-full hover:bg-blue-200 transition scale-75 md:scale-100 focus:outline-none"><IconSpeaker /></button>
                            <h2 className="text-4xl md:text-7xl font-extrabold text-blue-900 tracking-widest leading-normal">{cq.phrase.replace(new RegExp(cq.target.word, 'g'), '「  」')}</h2>
                        </div>
                        <div className="grid grid-cols-2 gap-4 md:gap-6 w-full">
                            {cq.options.map((opt, idx) => (
                                <button key={idx} onClick={() => handleAnswer(opt)} disabled={!!feedback} className={getBtnClass(opt)}>{opt}</button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
