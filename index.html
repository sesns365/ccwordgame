                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(800, ctx.currentTime);

                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(freq, startTime);

                                                            </div>
                                                        )}
                                                    </>
                                                )}
                                            </button>

                                </div>
                            </div>
                        </div>
                    );
                }

                if (view === 'gamePlay') {

                }

                if (view === 'gameResult') {
                    const { score, mistakes, endReason, timeSpent } = gameResult;
                    const isPass = !endReason && score >= 80;

                    const formatTime = (seconds) => {
                        const m = Math.floor(seconds / 60);
                        const s = seconds % 60;
                        if (m > 0) return `${m} 分 ${s} 秒`;

                    const handleSaveAndNext = async () => {
                        const historyKey = `v${activeVol}l${activeLevel}_${Date.now()}`;

                    const downloadScorecard = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = 800;
                        canvas.height = 600;
                        const ctx = canvas.getContext('2d');

                        ctx.fillStyle = '#f8fafc';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);

                        ctx.fillStyle = '#1e3a8a';
                        ctx.font = 'bold 56px sans-serif'; 
                        ctx.textAlign = 'center';
                        ctx.fillText('識字大冒險', 400, 85);

                        ctx.fillStyle = '#3b82f6';
                        ctx.fillRect(100, 115, 600, 4);

                        ctx.fillStyle = '#334155';
                        ctx.font = 'bold 36px sans-serif';
                        ctx.fillText(`挑戰者：${playerName}`, 400, 180);
                        
                        ctx.font = '32px sans-serif';
                        ctx.fillText(`挑戰關卡：第 ${activeVol} 冊 / 第 ${activeLevel} 關`, 400, 240);
                        
                        const modeText = appSettings.gameMode === 'normal' ? '一般模式' : appSettings.gameMode === 'heart' ? '愛心制度' : appSettings.gameMode === 'timer' ? '計時模式' : '交卷模式';
                        ctx.fillText(`遊戲模式：${modeText}`, 400, 300);
                        
                        let scoreY = 400;
                        if (appSettings.gameMode === 'timer') {
                            ctx.fillText(`花費時間：${formatTime(timeSpent)}`, 400, 360);

                        }

                        ctx.font = 'bold 72px sans-serif';
                        if (endReason === 'heart') {
                            ctx.fillStyle = '#ef4444';
                            ctx.fillText('挑戰失敗 (愛心耗盡)', 400, scoreY);
                        } else if (endReason === 'timeout') {

                        const link = document.createElement('a');
                        link.download = `${playerName}_第${activeVol}冊第${activeLevel}關_成績單.png`;
                        link.href = canvas.toDataURL('image/png');
                        link.click();

                                        <div className="flex flex-col gap-3">
                                            {mistakes.map((m, i) => (
                                                <div key={i} className="flex items-center justify-between bg-white p-3 md:p-4 rounded-xl shadow-sm border border-orange-100 text-center sm:text-left">
                                                    <div className="flex items-center gap-3 md:gap-4 flex-wrap">
                                                        <span className="text-3xl md:text-4xl font-bold text-red-500">{m.target.word}</span>
                                                        <span className="text-lg md:text-2xl text-slate-700 font-bold">{m.target.phrases.join(' , ')}</span>
                                                    </div>
                                                    <button onClick={() => speak([m.target.word, ...m.target.phrases].join('，'))} className="p-2 md:p-3 bg-blue-100 text-blue-600 rounded-full hover:bg-blue-200 shrink-0 focus:outline-none" title="朗讀此字詞">
                                                        <IconSpeaker />
                                                    </button>

                                <div className="flex flex-col sm:flex-row justify-center gap-3 md:gap-4 w-full">
                                    <button onClick={downloadScorecard} className="flex-1 py-3 md:py-4 bg-purple-100 text-purple-700 rounded-xl md:rounded-2xl font-bold text-lg md:text-xl hover:bg-purple-200 transition border-2 border-purple-200 focus:outline-none">

                return null;
            };

            return (
                <div className="flex flex-col min-h-screen bg-slate-50 relative overflow-x-hidden">
                    <div className="flex-1 flex flex-col">
                        {renderContent()}
                    </div>
                    
                    {showSettings && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl p-6 md:p-8 max-w-md w-full shadow-2xl max-h-[90vh] overflow-y-auto custom-scrollbar">
                                <h2 className="text-2xl md:text-3xl font-bold mb-4 md:mb-6 text-slate-800 flex items-center gap-2">
                                    <IconSettings /> 遊戲設定

                                <div className="flex flex-col gap-4 md:gap-6">

                                                <button onClick={()=>toggleSetting('fontSizeLevel', 0)} className={`px-3 py-1 rounded font-bold transition focus:outline-none ${appSettings.fontSizeLevel===0?'bg-blue-500 text-white':'bg-white border border-slate-300 hover:bg-slate-100'}`}>A-</button>

                                                <button onClick={()=>toggleSetting('fontSizeLevel', 2)} className={`px-3 py-1 rounded font-bold transition focus:outline-none ${appSettings.fontSizeLevel===2?'bg-blue-500 text-white':'bg-white border border-slate-300 hover:bg-slate-100'}`}>A+</button>

                                        <span className="text-lg font-bold text-slate-700 border-b pb-2">語音設定</span>
                                        <label className="flex items-center justify-between cursor-pointer group">
                                            <span className="font-bold text-slate-600 text-sm md:text-base group-hover:text-blue-600 transition">自動報讀題目</span>
                                            <input type="checkbox" checked={appSettings.autoRead} onChange={() => toggleSetting('autoRead')} className="w-5 h-5 md:w-6 md:h-6 accent-blue-500 focus:outline-none" />
                                        </label>
                                        
                                        <div className="flex flex-col gap-2">
                                            <div className="flex justify-between items-center">
                                                <span className="font-bold text-slate-600 text-sm md:text-base">語音速度</span>
                                                <span className="text-xs text-slate-500 bg-slate-200 px-2 py-0.5 rounded">{appSettings.voiceRate || 0.85}x</span>
                                            </div>
                                            <input type="range" min="0.5" max="1.5" step="0.05" value={appSettings.voiceRate || 0.85} onChange={(e) => toggleSetting('voiceRate', parseFloat(e.target.value))} className="w-full accent-blue-500 focus:outline-none" />
                                        </div>

                                        {voices.length > 0 && (

                                                <select value={appSettings.voiceURI || ''} onChange={(e) => toggleSetting('voiceURI', e.target.value)} className="p-2 rounded-lg border border-slate-300 bg-white text-sm focus:outline-none focus:border-blue-500">
                                                    <option value="">預設語音</option>
                                                    {voices.map(v => <option key={v.voiceURI} value={v.voiceURI}>{v.name}</option>)}
                                                </select>

                                        <button onClick={() => speak('這是一個測試聲音，聽聽看吧！')} className="mt-2 py-2 bg-blue-100 text-blue-700 rounded-lg font-bold text-sm hover:bg-blue-200 transition flex items-center justify-center gap-2 focus:outline-none">
                                            <IconSpeaker /> 測試當前語音
                                        </button>
                                    </div>

                                    <div className="bg-slate-50 p-3 md:p-4 rounded-xl border border-slate-200 flex flex-col gap-2 md:gap-3">
                                        <span className="text-lg font-bold text-slate-700 border-b pb-2 mb-1">遊戲模式</span>
                                        <label className="flex items-start gap-2 md:gap-3 cursor-pointer p-2 hover:bg-slate-100 rounded-lg text-left">
                                            <input type="radio" name="gameMode" value="normal" checked={appSettings.gameMode === 'normal'} onChange={(e) => toggleSetting('gameMode', e.target.value)} className="w-4 h-4 md:w-5 md:h-5 mt-1 focus:outline-none" />
                                            <div className="flex flex-col">
                                                <span className="font-bold text-base md:text-lg text-slate-800">一般模式</span>
                                                <span className="text-xs md:text-sm text-slate-500">答題後即時顯示對錯，全部答完後結算分數。</span>
                                            </div>
                                        </label>
                                        <label className="flex items-start gap-2 md:gap-3 cursor-pointer p-2 hover:bg-slate-100 rounded-lg text-left">
                                            <input type="radio" name="gameMode" value="heart" checked={appSettings.gameMode === 'heart'} onChange={(e) => toggleSetting('gameMode', e.target.value)} className="w-4 h-4 md:w-5 md:h-5 mt-1 focus:outline-none" />
                                            <div className="flex flex-col">
                                                <span className="font-bold text-base md:text-lg text-slate-800">愛心制度 (3條命)</span>
                                                <span className="text-xs md:text-sm text-slate-500">你只有3顆愛心，答錯3題就需要重新來過！</span>
                                            </div>
                                        </label>
                                        <label className="flex items-start gap-2 md:gap-3 cursor-pointer p-2 hover:bg-slate-100 rounded-lg text-left">
                                            <input type="radio" name="gameMode" value="timer" checked={appSettings.gameMode === 'timer'} onChange={(e) => toggleSetting('gameMode', e.target.value)} className="w-4 h-4 md:w-5 md:h-5 mt-1 focus:outline-none" />
                                            <div className="flex flex-col w-full">
                                                <span className="font-bold text-base md:text-lg text-slate-800">計時模式</span>
                                                <span className="text-xs md:text-sm text-slate-500">在限定時間內完成所有題目。</span>
                                                {appSettings.gameMode === 'timer' && (
                                                    <div className="mt-2 flex items-center gap-2">
                                                        <span className="text-sm font-bold text-slate-600">設定時間：</span>
                                                        <select value={appSettings.timerDuration || 60} onChange={(e) => toggleSetting('timerDuration', parseInt(e.target.value))} className="p-1 border border-slate-300 rounded text-sm bg-white focus:outline-none focus:border-blue-500">
                                                            <option value={30}>30 秒</option>
                                                            <option value={60}>60 秒</option>
                                                            <option value={90}>90 秒</option>
                                                            <option value={120}>120 秒</option>
                                                            <option value={300}>5 分鐘</option>
                                                        </select>
                                                    </div>
                                                )}
                                            </div>
                                        </label>
                                        <label className="flex items-start gap-2 md:gap-3 cursor-pointer p-2 hover:bg-slate-100 rounded-lg text-left">
                                            <input type="radio" name="gameMode" value="submit" checked={appSettings.gameMode === 'submit'} onChange={(e) => toggleSetting('gameMode', e.target.value)} className="w-4 h-4 md:w-5 md:h-5 mt-1 focus:outline-none" />
                                            <div className="flex flex-col">
                                                <span className="font-bold text-base md:text-lg text-slate-800">交卷模式</span>
                                                <span className="text-xs md:text-sm text-slate-500">作答時不提示對錯，全部測驗完畢後才知道結果。</span>
                                            </div>
                                        </label>
                                    </div>
                                </div>

                                <button onClick={() => setShowSettings(false)} className="w-full mt-6 md:mt-8 bg-blue-500 text-white font-bold text-lg md:text-xl py-3 rounded-xl hover:bg-blue-600 transition focus:outline-none">
                                    完成設定
                                </button>
                            </div>
                        </div>
                    )}

                    <footer className="w-full text-center py-4 md:py-6 text-slate-400 font-bold text-xs md:text-sm bg-slate-100 border-t border-slate-200 mt-auto">
                        由特工365製作
                    </footer>
                </div>
            );
        }

        const GamePlayView = ({ vol, level, levelWords, allWordsInVol, appSettings, onFinish, onCancel, speak, playSuccess, playFail, playCelebration }) => {
            const [questions, setQuestions] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [mistakes, setMistakes] = useState([]);
            const [feedback, setFeedback] = useState(null); 
            const [hearts, setHearts] = useState(3);
            
            const [timeElapsed, setTimeElapsed] = useState(0);
            const [timeLeft, setTimeLeft] = useState(appSettings.timerDuration || 60);

            const isHeartMode = appSettings.gameMode === 'heart';
            const isSubmitMode = appSettings.gameMode === 'submit';
            const isTimerMode = appSettings.gameMode === 'timer';

            useEffect(() => {
                const generated = levelWords.map(targetObj => {
                    const opts = [targetObj.word];
                    
                    let pool = levelWords.filter(w => w.word !== targetObj.word);
                    const shuffledPool = [...pool].sort(() => 0.5 - Math.random());
                    
                    for (let i = 0; i < Math.min(3, shuffledPool.length); i++) {
                        opts.push(shuffledPool[i].word);
                    }
                    
                    if (opts.length < 4) {
                        const extraPool = allWordsInVol.filter(w => w.word !== targetObj.word && !pool.some(p => p.word === w.word));
                        const shuffledExtra = [...extraPool].sort(() => 0.5 - Math.random());
                        for (let i = 0; opts.length < 4 && i < shuffledExtra.length; i++) {
                            opts.push(shuffledExtra[i].word);
                        }
                    }
                    
                    const randomPhrase = targetObj.phrases.length > 0 
                        ? targetObj.phrases[Math.floor(Math.random() * targetObj.phrases.length)]
                        : null;

                    return {
                        target: targetObj,
                        phrase: randomPhrase, 
                        options: opts.sort(() => 0.5 - Math.random()) 
                    };
                });
                setQuestions(generated);
            }, [levelWords, allWordsInVol]);

            const currentQ = questions[currentIndex];

            useEffect(() => {
                if (!currentQ || feedback?.status === 'timeout') return;
                const timer = setInterval(() => {
                    setTimeElapsed(prev => prev + 1);
                    if (isTimerMode) {
                        setTimeLeft(prev => prev - 1);
                    }
                }, 1000);
                return () => clearInterval(timer);
            }, [currentQ, isTimerMode, feedback]);

            useEffect(() => {
                if (isTimerMode && timeLeft <= 0 && (!feedback || feedback.status !== 'timeout')) {
                    playFail();
                    setFeedback({ status: 'timeout' });
                    setTimeout(() => {
                        const score = Math.round(((questions.length - mistakes.length) / questions.length) * 100);
                        onFinish(score, mistakes, 'timeout', timeElapsed);
                    }, 1500);
                }
            }, [timeLeft, isTimerMode, feedback, mistakes, questions.length, timeElapsed, onFinish, playFail]);

            useEffect(() => {
                if (currentQ && !feedback) {
                    if (appSettings.autoRead) {
                        speak(currentQ.phrase || '請選出正確的字');
                    }
                }
            }, [currentIndex, currentQ, appSettings]);

            if (!currentQ) return <div className="w-full flex-1 flex items-center justify-center text-xl md:text-3xl font-bold">準備中...</div>;

            const handleAnswer = (ans) => {
                if (feedback) return; 

                const isCorrect = ans === currentQ.target.word;

                if (isSubmitMode) {
                    let newMistakes = mistakes;
                    if (!isCorrect) {
                        newMistakes = [...mistakes, currentQ];
                        setMistakes(newMistakes);
                    }
                    setFeedback({ status: 'selected', clicked: ans });
                    
                    setTimeout(() => {
                        setFeedback(null);
                        if (currentIndex + 1 < questions.length) {
                            setCurrentIndex(prev => prev + 1);
                        } else {
                            const score = Math.round(((questions.length - newMistakes.length) / questions.length) * 100);
                            onFinish(score, newMistakes, false, timeElapsed);
                        }
                    }, 300);
                    return;
                }

                if (isCorrect) {
                    playSuccess();
                    setFeedback({ status: 'correct', clicked: ans });
                    
                    setTimeout(() => {
                        setFeedback(null);
                        if (currentIndex + 1 < questions.length) {
                            setCurrentIndex(prev => prev + 1);
                        } else {
                            const score = Math.round(((questions.length - mistakes.length) / questions.length) * 100);
                            if (score >= 80) playCelebration();
                            onFinish(score, mistakes, false, timeElapsed);
                        }
                    }, 1000); 
                    
                } else {
                    playFail();
                    const newMistakes = [...mistakes, currentQ];
                    setMistakes(newMistakes);
                    setFeedback({ status: 'incorrect', clicked: ans });

                    if (isHeartMode) {
                        const newHearts = hearts - 1;
                        setHearts(newHearts);
                        if (newHearts <= 0) {
                            setTimeout(() => {
                                onFinish(0, newMistakes, 'heart', timeElapsed); 
                            }, 1500);
                            return;
                        }
                    }
                    
                    setTimeout(() => {
                        setFeedback(null);
                        if (currentIndex + 1 < questions.length) {
                            setCurrentIndex(prev => prev + 1);
                        } else {
                            const score = Math.round(((questions.length - newMistakes.length) / questions.length) * 100);
                            if (score >= 80) playCelebration();
                            onFinish(score, newMistakes, false, timeElapsed);
                        }
                    }, 2500); 
                }
            };

            const targetPhrase = currentQ.phrase;
            const displayText = targetPhrase ? targetPhrase.replace(new RegExp(currentQ.target.word, 'g'), '「    」') : '請選出正確的字';

            return (
                <div className="w-full flex-1 flex flex-col items-center">
                    <div className="w-full bg-white shadow-sm p-3 md:p-4 flex items-center justify-between mb-4 md:mb-8 sticky top-0 z-30">
                        <button onClick={onCancel} className="px-3 py-1.5 md:px-6 md:py-2 bg-slate-200 hover:bg-slate-300 rounded-lg md:rounded-xl font-bold text-slate-700 shrink-0 text-xs md:text-base focus:outline-none">放棄退出</button>
                        <div className="flex-1 px-4 md:px-8 min-w-0">
                            <div className="w-full bg-slate-200 rounded-full h-2 md:h-4">
                                <div className="bg-blue-500 h-2 md:h-4 rounded-full transition-all duration-300" style={{ width: `${((currentIndex) / questions.length) * 100}%` }}></div>
                            </div>
                            <div className="text-center mt-1 md:mt-2 font-bold text-slate-500 text-[10px] md:text-sm whitespace-nowrap">進度：{currentIndex + 1} / {questions.length}</div>
                        </div>
                        {isTimerMode && (
                            <div className={`flex items-center gap-2 px-3 py-1.5 md:px-4 md:py-2 rounded-lg md:rounded-xl border shrink-0 font-bold text-xs md:text-base ${timeLeft <= 10 ? 'bg-red-100 text-red-600 border-red-200 animate-pulse' : 'bg-orange-50 text-orange-600 border-orange-200'}`}>
                                ⏳ {Math.floor(timeLeft / 60)}:{(timeLeft % 60).toString().padStart(2, '0')}
                            </div>
                        )}
                        {isHeartMode && (
                            <div className="flex items-center gap-1 md:gap-2 px-2 py-1 md:px-4 md:py-2 bg-red-50 rounded-lg md:rounded-xl border border-red-100 shrink-0">
                                {[...Array(3)].map((_, i) => (
                                    <div key={i} className={`transition-all duration-300 scale-75 md:scale-100 ${i < hearts ? "opacity-100" : "opacity-20 grayscale scale-50 md:scale-75"}`}>
                                        <IconHeart />
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    <div className="w-full max-w-4xl px-4 md:px-6 flex flex-col items-center flex-1 justify-center pb-10">
                        <div className="w-full bg-white rounded-2xl md:rounded-3xl shadow-lg p-6 sm:p-8 md:p-12 text-center mb-6 md:mb-10 border-4 border-blue-50 relative">
                            <button onClick={() => speak(currentQ.phrase || '請選出正確的字')} className="absolute top-2 right-2 md:top-6 md:right-6 p-2 md:p-4 bg-blue-100 text-blue-600 rounded-full hover:bg-blue-200 transition scale-75 md:scale-100 focus:outline-none" title="點擊朗讀題目">
                                <IconSpeaker />
                            </button>
                            <h2 className="text-4xl sm:text-5xl md:text-7xl font-extrabold text-blue-900 tracking-widest leading-normal md:leading-tight">{displayText}</h2>
                        </div>

                        {feedback && feedback.status !== 'selected' && (
                            <div className="absolute inset-0 z-50 flex items-center justify-center pointer-events-none">
                                {feedback.status === 'correct' ? 
                                    <div className="bg-green-500 text-white rounded-full p-6 md:p-10 shadow-2xl scale-110 md:scale-150 animate-bounce">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" className="md:w-20 md:h-20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                                    </div>
                                : feedback.status === 'timeout' ? 
                                    <div className="bg-red-500 text-white rounded-3xl p-6 md:p-10 shadow-2xl scale-110 md:scale-150 animate-pulse font-bold text-2xl md:text-4xl text-center">
                                        時間到！
                                    </div>
                                :
                                    <div className="bg-red-500 text-white rounded-full p-6 md:p-10 shadow-2xl scale-110 md:scale-150 animate-pulse">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" className="md:w-20 md:h-20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                                    </div>
                                }
                            </div>
                        )}

                        <div className="grid grid-cols-2 gap-4 md:gap-6 w-full">
                            {currentQ.options.map((opt, idx) => {
                                let btnClass = "bg-white border-4 border-slate-200 rounded-[1.5rem] md:rounded-[2rem] p-6 sm:p-8 md:p-10 text-5xl sm:text-6xl md:text-8xl font-bold text-slate-800 hover:bg-blue-50 hover:border-blue-400 hover:text-blue-700 hover:shadow-xl transition-all active:scale-95 focus:outline-none";
                                
                                if (feedback) {
                                    if (feedback.status === 'selected') {
                                        btnClass = opt === feedback.clicked 
                                            ? "bg-blue-100 border-4 border-blue-500 rounded-[1.5rem] md:rounded-[2rem] p-6 sm:p-8 md:p-10 text-5xl sm:text-6xl md:text-8xl font-bold text-blue-700 shadow-xl scale-105 z-10 focus:outline-none" 
                                            : "bg-white border-4 border-slate-200 rounded-[1.5rem] md:rounded-[2rem] p-6 sm:p-8 md:p-10 text-5xl sm:text-6xl md:text-8xl font-bold text-slate-300 opacity-40 focus:outline-none";
                                    } else {
                                        if (opt === currentQ.target.word) {
                                            btnClass = "bg-green-100 border-4 border-green-500 rounded-[1.5rem] md:rounded-[2rem] p-6 sm:p-8 md:p-10 text-5xl sm:text-6xl md:text-8xl font-bold text-green-700 shadow-xl transition-all scale-105 z-10 focus:outline-none";
                                        } else if (feedback.status === 'incorrect' && opt === feedback.clicked) {
                                            btnClass = "bg-red-100 border-4 border-red-500 rounded-[1.5rem] md:rounded-[2rem] p-6 sm:p-8 md:p-10 text-5xl sm:text-6xl md:text-8xl font-bold text-red-700 transition-all opacity-70 focus:outline-none";
                                        } else {
                                            btnClass = "bg-white border-4 border-slate-200 rounded-[1.5rem] md:rounded-[2rem] p-6 sm:p-8 md:p-10 text-5xl sm:text-6xl md:text-8xl font-bold text-slate-300 transition-all opacity-40 focus:outline-none";
                                        }
                                    }
                                }

                                return (
                                    <button 
                                        key={idx}
                                        onClick={() => handleAnswer(opt)}
                                        disabled={!!feedback}
                                        className={btnClass}
                                    >
                                        {opt}
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
